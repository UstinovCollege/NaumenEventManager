<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Опросы - Naumen</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-4">
    <a href="/" class="btn btn-outline-secondary btn-sm mb-3">← На главную</a>
    <h2>📊 Активные опросы</h2>
    
    {% for p in polls %}
    <div class="card mb-3 mt-3">
        <div class="card-body">
            <h5>{{ p.question }}</h5>
            <form action="/poll/vote/{{ p.id }}" method="post">
                {% for opt in p.options %}
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="option_id" id="opt{{ opt.id }}" value="{{ opt.id }}" required>
                    <label class="form-check-label" for="opt{{ opt.id }}">{{ opt.option_text }}</label>
                </div>
                {% endfor %}
                <button type="submit" class="btn btn-primary btn-sm mt-2">Проголосовать</button>
            </form>
            <a href="/poll/results/{{ p.id }}" class="btn btn-outline-secondary btn-sm mt-2">Смотреть результаты</a>
        </div>
    </div>
    {% else %}
    <p class="mt-3 text-muted">Нет активных опросов.</p>
    {% endfor %}
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
