{% extends "base.html" %}
{% block content %}
<h2>📊 Активные опросы</h2>
{% for p in polls %}
<div class="card mb-3 mt-3">
    <div class="card-body">
        <h5>{{ p.question }}</h5>
        <form action="/poll/vote/{{ p.id }}" method="post">
            {% for opt in p.options %}
            <div class="form-check">
                <input class="form-check-input" type="radio" name="option_id" id="opt{{ opt.id }}" value="{{ opt.id }}" required>
                <label class="form-check-label" for="opt{{ opt.id }}">{{ opt.option_text }}</label>
            </div>
            {% endfor %}
            <button type="submit" class="btn btn-primary btn-sm mt-2">Проголосовать</button>
        </form>
        <a href="/poll/results/{{ p.id }}" class="btn btn-outline-secondary btn-sm mt-2">Смотреть результаты</a>
    </div>
</div>
{% else %}
<p class="mt-3 text-muted">Нет активных опросов.</p>
{% endfor %}
{% endblock %}
