<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Админка</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container py-4">

<h1>Панель организатора</h1>

<h3>Добавить мастер-класс</h3>
<form method="post" class="row g-2">
    <input name="title" class="form-control" placeholder="Название" required>
    <input name="speaker" class="form-control" placeholder="Спикер" required>
    <input name="time" class="form-control" placeholder="Время" required>
    <input name="location" class="form-control" placeholder="Место" required>
    <input name="capacity" type="number" class="form-control" placeholder="Кол-во мест" required>
    <button class="btn btn-primary mt-2">Добавить</button>
</form>

<hr>

<h3>Участники</h3>

<table class="table">
    <tr>
        <th>МК</th>
        <th>Имя</th>
        <th>Контакт</th>
        <th>Статус</th>
        <th>Действие</th>
    </tr>

    {% for r in registrations %}
    <tr>
        <td>{{ r.title }}</td>
        <td>{{ r.name }}</td>
        <td>{{ r.contact }}</td>
        <td>
            {% if r.status == 'confirmed' %}
                <span class="badge bg-success">Подтвержден</span>
            {% else %}
                <span class="badge bg-warning">Лист ожидания #{{ r.waitlist_position }}</span>
            {% endif %}
        </td>
        <td>
            <a href="/delete/{{ r.id }}" class="btn btn-danger btn-sm">Удалить</a>
        </td>
    </tr>
    {% endfor %}
</table>

</body>
</html>
