<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Вопрос организаторам - Naumen</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-4">
    <a href="/" class="btn btn-outline-secondary btn-sm mb-3">← На главную</a>
    <h2>✉️ Задать вопрос организаторам</h2>
    
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
            <div class="alert alert-{{ 'danger' if category == 'error' else 'success' }} alert-dismissible fade show">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            {% endfor %}
        {% endif %}
    {% endwith %}
    
    <form method="post" class="mt-3">
        <div class="mb-2">
            <input name="name" class="form-control" placeholder="Ваше имя *" required>
        </div>
        <div class="mb-2">
            <input name="contact" class="form-control" placeholder="Email или Telegram для ответа *" required>
        </div>
        <div class="mb-2">
            <textarea name="text" class="form-control" rows="4" placeholder="Текст вопроса *" required></textarea>
        </div>
        <button class="btn btn-primary">Отправить вопрос</button>
    </form>
    <p class="text-muted small mt-2">* Обязательные поля</p>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
