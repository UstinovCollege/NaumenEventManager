<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Мастер-классы</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container py-4">

<h1 class="mb-4">Мастер-классы</h1>

<div class="row">
    {% for mc in masterclasses %}
    <div class="col-md-4">
        <div class="card mb-3">
            <div class="card-body">
                <h5>{{ mc.title }}</h5>
                <p>Спикер: {{ mc.speaker }}</p>
                <p>Время: {{ mc.time }}</p>
                <p>Место: {{ mc.location }}</p>

                {% if mc.registered_count < mc.capacity %}
                    <span class="badge bg-success">🟢 Свободно</span>
                {% else %}
                    <span class="badge bg-danger">🔴 Мест нет</span>
                {% endif %}

                <br><br>
                <a href="/register/{{ mc.id }}" class="btn btn-primary">Записаться</a>
            </div>
        </div>
    </div>
    {% endfor %}
</div>

<hr>
<a href="/admin">Панель организатора</a>

</body>
</html>
