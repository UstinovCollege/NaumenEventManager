<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Результаты опроса - Naumen</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-4">
    <a href="/poll" class="btn btn-outline-secondary btn-sm mb-3">← К опросам</a>
    <h2>📊 Результаты: {{ poll.question }}</h2>
    
    <div class="mt-3">
        {% for opt in options %}
        <div class="mb-2">
            <strong>{{ opt.option_text }}</strong>: {{ opt.votes }} голосов
            <div class="progress" style="height: 20px;">
                <div class="progress-bar bg-success" role="progressbar" 
                     style="width: {{ (opt.votes / total) * 100 }}%">
                    {{ "%.1f"|format((opt.votes / total) * 100) }}%
                </div>
            </div>
        </div>
        {% endfor %}
        <p class="text-muted small">Всего голосов: {{ total }}</p>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
