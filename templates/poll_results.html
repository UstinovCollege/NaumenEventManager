{% extends "base.html" %}
{% block content %}
<h2>📊 Результаты: {{ poll.question }}</h2>
<div class="mt-3">
    {% for opt in options %}
    <div class="mb-2">
        <strong>{{ opt.option_text }}</strong>: {{ opt.votes }} голосов
        <div class="progress" style="height: 20px;">
            <div class="progress-bar bg-success" role="progressbar" 
                 style="width: {{ (opt.votes / total) * 100 }}%">
                {{ "%.1f"|format((opt.votes / total) * 100) }}%
            </div>
        </div>
    </div>
    {% endfor %}
    <p class="text-muted small">Всего голосов: {{ total }}</p>
</div>
<a href="/poll" class="btn btn-outline-secondary mt-3">← К опросам</a>
{% endblock %}
